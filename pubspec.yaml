name: tutor_manager
description: تطبيق إدارة مراكز ودروس المدرسين
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Database (offline / local)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Storage / settings
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0

  # PDF
  pdf: ^3.11.1
  printing: 5.13.2

  # Export
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
